<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reserva de Mesas</title>

<!-- ============================================================
     PASSO 1: Substitua o objeto abaixo pelo seu firebaseConfig
     Ele aparece no Firebase Console > Configurações > Geral
     ============================================================ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, remove }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ▼▼▼ COLE SEU firebaseConfig AQUI ▼▼▼
// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyA_Vfef4Z8JXDEj970Q4JjNadapNk67uLk",
  authDomain: "reserva-mesas-e6b98.firebaseapp.com",
  databaseURL: "https://reserva-mesas-e6b98-default-rtdb.firebaseio.com",
  projectId: "reserva-mesas-e6b98",
  storageBucket: "reserva-mesas-e6b98.firebasestorage.app",
  messagingSenderId: "662638990559",
  appId: "1:662638990559:web:6fe500487520d1f4a8856a",
  measurementId: "G-HF77T56PB3"
};

  // ▲▲▲ FIM DO CONFIG ▲▲▲

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // expõe funções pro código abaixo
  window._fbSet    = (path, val) => set(ref(db, path), val);
  window._fbRemove = (path)      => remove(ref(db, path));
  window._fbListen = (path, cb)  => onValue(ref(db, path), snap => cb(snap.val()));
</script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f5f3ee;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 24px;
  }

  .container {
    max-width: 980px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    border: 1px solid #e0ddd6;
    overflow: hidden;
  }

  .header {
    padding: 20px 24px;
    border-bottom: 1px solid #e0ddd6;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 16px;
  }

  .header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  .header .sub { font-size: 13px; color: #888; margin-top: 2px; }

  .header-fields { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }

  .fg label {
    display: block;
    font-size: 11px; color: #999; margin-bottom: 4px;
    font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;
  }

  .fg input, .fg select {
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    padding: 6px 10px; border: 1px solid #e0ddd6; border-radius: 8px;
    background: #faf9f7; color: #1a1a1a; outline: none;
  }

  .fg input[type="date"]  { width: 148px; }
  .fg select              { width: 160px; }
  .fg input[type="text"]  { width: 140px; }

  .toolbar {
    padding: 10px 24px; border-bottom: 1px solid #e0ddd6;
    display: flex; justify-content: space-between; align-items: center;
    background: #faf9f7; flex-wrap: wrap; gap: 8px;
  }

  .stats { font-size: 12px; color: #888; }
  .stats b { color: #1a1a1a; font-weight: 600; }

  .sync-badge {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: #888;
    padding: 4px 10px; border-radius: 20px;
    border: 1px solid #e0ddd6; background: #fff;
  }

  .sync-dot {
    width: 7px; height: 7px; border-radius: 50%; background: #ccc;
    transition: background 0.3s;
  }
  .sync-dot.ok      { background: #52c41a; }
  .sync-dot.saving  { background: #faad14; animation: pulse 0.8s infinite; }
  .sync-dot.error   { background: #ff4d4f; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .toolbar-actions { display: flex; gap: 8px; align-items: center; }

  .btn {
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    padding: 6px 14px; border-radius: 8px; cursor: pointer;
    border: 1px solid #e0ddd6; background: #fff; color: #1a1a1a;
    transition: background 0.15s;
  }
  .btn:hover { background: #f5f3ee; }
  .btn-primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .btn-primary:hover { background: #333; }
  .btn-danger { color: #c0392b; border-color: #f0d0ce; }
  .btn-danger:hover { background: #fdf0ef; }

  .grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 6px; padding: 16px; background: #fff;
  }

  .cell {
    border: 1px solid #e0ddd6; border-radius: 8px;
    aspect-ratio: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.12s;
    padding: 4px; gap: 3px; background: #fff;
  }

  .cell:hover { border-color: #aaa; background: #faf9f7; transform: scale(1.05); }

  .cell.reserved { background: #edf4fb; border-color: #5b9fd4; }

  .cell-num {
    font-size: 11px; font-weight: 600; color: #bbb;
    font-family: 'DM Mono', monospace; line-height: 1;
  }
  .cell.reserved .cell-num { color: #2c6fa8; }

  .cell-name {
    font-size: 7px; color: #2c6fa8; text-align: center;
    word-break: break-word; line-height: 1.2;
    max-width: 100%; overflow: hidden; font-weight: 600;
  }

  .dots-row { display: flex; gap: 2px; align-items: center; justify-content: center; flex-wrap: wrap; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #ddd; flex-shrink: 0; }
  .cell.reserved .dot { background: #5b9fd4; }

  .legend {
    padding: 10px 24px; border-top: 1px solid #e0ddd6;
    display: flex; gap: 20px; align-items: center; flex-wrap: wrap;
    background: #faf9f7;
  }

  .leg { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #888; }
  .leg-box { width: 14px; height: 14px; border-radius: 4px; border: 1px solid; }
  .leg-free { background: #fff; border-color: #e0ddd6; }
  .leg-res  { background: #edf4fb; border-color: #5b9fd4; }
  .leg-dots { display: flex; gap: 12px; align-items: center; margin-left: auto; }
  .leg-dots-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #888; }

  /* MODAL */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.3); z-index: 100;
    align-items: center; justify-content: center;
    backdrop-filter: blur(2px);
  }
  .overlay.open { display: flex; }

  .modal {
    background: #fff; border: 1px solid #e0ddd6; border-radius: 16px;
    padding: 24px; width: 300px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  }

  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .modal .modal-sub { font-size: 12px; color: #999; margin-bottom: 16px; }

  .modal label {
    display: block; font-size: 11px; color: #999; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;
  }

  .modal input[type="text"] {
    font-family: 'DM Sans', sans-serif; font-size: 14px; width: 100%;
    padding: 8px 12px; border: 1px solid #e0ddd6; border-radius: 8px;
    background: #faf9f7; color: #1a1a1a; outline: none; margin-bottom: 14px;
  }
  .modal input[type="text"]:focus { border-color: #999; background: #fff; }

  .cap-toggle { display: flex; gap: 8px; margin-bottom: 16px; }

  .cap-btn {
    flex: 1; padding: 10px 8px;
    border: 1px solid #e0ddd6; border-radius: 10px;
    background: #faf9f7; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: 12px; color: #888;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    transition: all 0.12s;
  }
  .cap-btn.active { border-color: #5b9fd4; background: #edf4fb; color: #2c6fa8; font-weight: 500; }
  .cap-btn-dots { display: flex; gap: 3px; }
  .cap-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
  .cap-btn.active .cap-dot { background: #5b9fd4; }

  .modal-btns { display: flex; gap: 8px; margin-top: 4px; }
  .modal-btns button {
    flex: 1; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    padding: 9px; border-radius: 10px; cursor: pointer;
    border: 1px solid #e0ddd6; background: #fff; color: #1a1a1a; transition: all 0.12s;
  }
  .modal-btns button:hover { background: #f5f3ee; }
  .modal-btns .btn-reservar { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .modal-btns .btn-reservar:hover { background: #333; }
  .modal-btns .btn-cancelar { color: #c0392b; border-color: #f0d0ce; }
  .modal-btns .btn-cancelar:hover { background: #fdf0ef; }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: #1a1a1a; color: #fff;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    padding: 10px 20px; border-radius: 100px; z-index: 200;
    opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* PRINT */
  @media print {
    body { background: #fff; padding: 0; }
    .container { border-radius: 0; border: none; max-width: 100%; }
    .toolbar-actions, .overlay, .toast, .sync-badge { display: none !important; }
    .toolbar { background: #fff; }
    .legend  { background: #fff; }
    .cell { cursor: default; }
    .cell:hover { transform: none; }
    .grid { gap: 4px; padding: 10px; }
  }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div>
      <h1>Reserva de Mesas</h1>
      <div class="sub" id="sub">Sábado - Noite</div>
    </div>
    <div class="header-fields">
      <div class="fg">
        <label>Data</label>
        <input type="date" id="inp-data" onchange="saveMeta()">
      </div>
      <div class="fg">
        <label>Período</label>
        <select id="inp-periodo" onchange="saveMeta()">
          <option>Sábado - Noite</option>
          <option>Sexta - Noite</option>
          <option>Domingo - Tarde</option>
          <option>Outro</option>
        </select>
      </div>
      <div class="fg">
        <label>Banda</label>
        <input type="text" id="inp-banda" placeholder="Nome da banda" onchange="saveMeta()">
      </div>
    </div>
  </div>

  <div class="toolbar">
    <div class="stats" id="stats">Conectando...</div>
    <div class="toolbar-actions">
      <div class="sync-badge">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-label">Aguardando</span>
      </div>
      <button class="btn btn-danger" onclick="clearAll()">Limpar tudo</button>
      <button class="btn btn-primary" onclick="window.print()">🖨️ Imprimir</button>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="legend">
    <div class="leg"><div class="leg-box leg-free"></div>Livre</div>
    <div class="leg"><div class="leg-box leg-res"></div>Reservado</div>
    <div class="leg-dots">
      <div class="leg-dots-item">
        <div class="dots-row"><div class="dot"></div><div class="dot"></div></div>
        2 pessoas
      </div>
      <div class="leg-dots-item">
        <div class="dots-row"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        4 pessoas
      </div>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="m-title">Mesa 01</h2>
    <div class="modal-sub" id="m-sub"></div>
    <label>Capacidade</label>
    <div class="cap-toggle">
      <div class="cap-btn active" id="cap-2" onclick="selCap(2)">
        <div class="cap-btn-dots"><div class="cap-dot"></div><div class="cap-dot"></div></div>
        2 pessoas
      </div>
      <div class="cap-btn" id="cap-4" onclick="selCap(4)">
        <div class="cap-btn-dots"><div class="cap-dot"></div><div class="cap-dot"></div><div class="cap-dot"></div><div class="cap-dot"></div></div>
        4 pessoas
      </div>
    </div>
    <label>Nome do responsável</label>
    <input type="text" id="m-name" placeholder="Ex: João Silva"
           onkeydown="if(event.key==='Enter') saveRes()">
    <label>Observação (opcional)</label>
    <input type="text" id="m-obs" placeholder="Ex: aniversário"
           onkeydown="if(event.key==='Enter') saveRes()">
    <div class="modal-btns">
      <button class="btn-reservar" onclick="saveRes()">Reservar</button>
      <button class="btn-cancelar" id="btn-del" onclick="delRes()" style="display:none">Cancelar reserva</button>
      <button onclick="closeModal()">Fechar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── state ──────────────────────────────────────────────────────────────────
  let state = {};   // { "01": { name, obs, cap }, … }
  let meta  = {};
  let selN  = null;
  let selCp = 2;

  const defCap = n => (parseInt(n) % 2 === 0 ? 4 : 2);

  // ── sync helpers ───────────────────────────────────────────────────────────
  function setSync(status) {
    const dot   = document.getElementById('sync-dot');
    const label = document.getElementById('sync-label');
    dot.className = 'sync-dot ' + status;
    label.textContent = { ok:'Salvo', saving:'Salvando...', error:'Erro' }[status] || '';
  }

  // ── Firebase listeners (called once Firebase module loads) ─────────────────
  function initListeners() {
    if (!window._fbListen) { setTimeout(initListeners, 200); return; }

    // listen to reservations
    window._fbListen('reservas', data => {
      state = data || {};
      renderGrid();
      setSync('ok');
    });

    // listen to meta (date/period/band)
    window._fbListen('meta', data => {
      if (!data) return;
      meta = data;
      if (data.data)    document.getElementById('inp-data').value    = data.data;
      if (data.periodo) document.getElementById('inp-periodo').value  = data.periodo;
      if (data.banda)   document.getElementById('inp-banda').value    = data.banda;
      updateSub();
    });
  }

  // ── meta ───────────────────────────────────────────────────────────────────
  function saveMeta() {
    updateSub();
    const m = {
      data:    document.getElementById('inp-data').value,
      periodo: document.getElementById('inp-periodo').value,
      banda:   document.getElementById('inp-banda').value,
    };
    if (window._fbSet) window._fbSet('meta', m);
  }

  function updateSub() {
    const periodo = document.getElementById('inp-periodo').value;
    const data    = document.getElementById('inp-data').value;
    const banda   = document.getElementById('inp-banda').value;
    let parts = [periodo];
    if (data) {
      const d = new Date(data + 'T12:00:00');
      parts.unshift(d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric' }));
    }
    if (banda) parts.push('· ' + banda);
    document.getElementById('sub').textContent = parts.join(' — ');
  }

  // ── grid ───────────────────────────────────────────────────────────────────
  function renderGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    for (let i = 1; i <= 100; i++) {
      const n   = String(i).padStart(2, '0');
      const res = state[n];
      const cap = res ? res.cap : defCap(n);

      const cell = document.createElement('div');
      cell.className = 'cell' + (res ? ' reserved' : '');
      cell.onclick   = () => openModal(n);

      const row = document.createElement('div');
      row.className = 'dots-row';
      for (let d = 0; d < cap; d++) {
        const dot = document.createElement('div');
        dot.className = 'dot';
        row.appendChild(dot);
      }
      cell.appendChild(row);

      const num = document.createElement('div');
      num.className   = 'cell-num';
      num.textContent = n;
      cell.appendChild(num);

      if (res) {
        const nm = document.createElement('div');
        nm.className   = 'cell-name';
        nm.textContent = res.name;
        cell.appendChild(nm);
      }

      grid.appendChild(cell);
    }
    updateStats();
  }

  function updateStats() {
    const total = Object.keys(state).length;
    const p2    = Object.values(state).filter(r => r.cap === 2).length;
    const p4    = Object.values(state).filter(r => r.cap === 4).length;
    document.getElementById('stats').innerHTML =
      `<b>${total}</b> reservadas (${p2} de 2, ${p4} de 4) &nbsp;·&nbsp; <b>${100 - total}</b> livres`;
  }

  // ── modal ──────────────────────────────────────────────────────────────────
  function openModal(n) {
    selN = n;
    const res = state[n];
    const cap = res ? res.cap : defCap(n);
    document.getElementById('m-title').textContent = `Mesa ${n}`;
    document.getElementById('m-sub').textContent   = res ? `Reservado por: ${res.name}` : 'Clique em Reservar para confirmar';
    selCap(cap);
    document.getElementById('m-name').value = res ? res.name  : '';
    document.getElementById('m-obs').value  = res ? (res.obs || '') : '';
    document.getElementById('btn-del').style.display = res ? 'block' : 'none';
    document.getElementById('overlay').classList.add('open');
    setTimeout(() => document.getElementById('m-name').focus(), 80);
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    selN = null;
  }

  function selCap(c) {
    selCp = c;
    document.getElementById('cap-2').classList.toggle('active', c === 2);
    document.getElementById('cap-4').classList.toggle('active', c === 4);
  }

  async function saveRes() {
    const name = document.getElementById('m-name').value.trim();
    const obs  = document.getElementById('m-obs').value.trim();
    if (!name) { document.getElementById('m-name').focus(); return; }
    setSync('saving');
    await window._fbSet(`reservas/${selN}`, { name, obs, cap: selCp });
    toast(`Mesa ${selN} reservada — ${name}`);
    closeModal();
  }

  async function delRes() {
    const n = selN;
    setSync('saving');
    await window._fbRemove(`reservas/${n}`);
    toast(`Reserva da mesa ${n} cancelada`);
    closeModal();
  }

  async function clearAll() {
    if (!confirm('Apagar TODAS as reservas? Isso afeta todos os usuários.')) return;
    setSync('saving');
    await window._fbRemove('reservas');
    toast('Todas as reservas foram removidas');
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // close modal on overlay click
  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('overlay')) closeModal();
  });

  // ── init ───────────────────────────────────────────────────────────────────
  document.getElementById('inp-data').value = new Date().toISOString().slice(0, 10);
  renderGrid();
  initListeners();
</script>
</body>
</html>
