<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reserva de Mesas</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, remove, off }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ▼▼▼ COLE SEU firebaseConfig AQUI ▼▼▼
// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyA_Vfef4Z8JXDEj970Q4JjNadapNk67uLk",
  authDomain: "reserva-mesas-e6b98.firebaseapp.com",
  databaseURL: "https://reserva-mesas-e6b98-default-rtdb.firebaseio.com",
  projectId: "reserva-mesas-e6b98",
  storageBucket: "reserva-mesas-e6b98.firebasestorage.app",
  messagingSenderId: "662638990559",
  appId: "1:662638990559:web:6fe500487520d1f4a8856a",
  measurementId: "G-HF77T56PB3"
};
  // ▲▲▲ FIM DO CONFIG ▲▲▲

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  let curRef = null, curCb = null;

  window._fb = {
    set:    (path, val) => set(ref(db, path), val),
    remove: (path)      => remove(ref(db, path)),
    listen: (path, cb)  => {
      if (curRef && curCb) off(curRef, 'value', curCb);
      curRef = ref(db, path);
      curCb  = onValue(curRef, snap => cb(snap.val()));
    }
  };
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #f0ede8;
  color: #1a1a1a;
  padding: 20px;
}

/* ── TELA: container normal ── */
.screen-wrap {
  max-width: 1100px;
  margin: 0 auto;
  background: #fff;
  border-radius: 14px;
  border: 1px solid #e0ddd6;
  overflow: hidden;
}

/* ── HEADER ── */
.header {
  padding: 14px 20px 12px;
  border-bottom: 1px solid #e0ddd6;
  display: flex; gap: 14px; align-items: flex-end; flex-wrap: wrap;
}

.header-title { flex: 1; min-width: 160px; }
.header-title h1 { font-size: 17px; font-weight: 600; }
.header-title .sub { font-size: 12px; color: #999; margin-top: 2px; }

.header-controls { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }

.fg label {
  display: block; font-size: 10px; color: #aaa; margin-bottom: 3px;
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px;
}
.fg input[type="date"],
.fg input[type="text"],
.fg select {
  font-family: 'DM Sans', sans-serif; font-size: 13px;
  padding: 6px 10px; border: 1px solid #e0ddd6; border-radius: 8px;
  background: #faf9f7; color: #1a1a1a; outline: none;
}
.fg input[type="date"] { width: 142px; }
.fg select             { width: 120px; }
.fg input[type="text"] { width: 140px; }

.turno-toggle { display: flex; gap: 5px; }
.turno-btn {
  padding: 6px 13px; border-radius: 8px; font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500; cursor: pointer;
  border: 1px solid #e0ddd6; background: #faf9f7; color: #888; transition: all 0.15s;
}
.turno-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

/* ── TOOLBAR ── */
.toolbar {
  padding: 7px 20px; border-bottom: 1px solid #e0ddd6;
  display: flex; justify-content: space-between; align-items: center;
  background: #faf9f7; flex-wrap: wrap; gap: 6px;
}
.stats { font-size: 11px; color: #999; }
.stats b { color: #1a1a1a; font-weight: 600; }
.sync-badge {
  display: flex; align-items: center; gap: 5px; font-size: 11px; color: #aaa;
  padding: 3px 9px; border-radius: 20px; border: 1px solid #e8e5e0; background: #fff;
}
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #ccc; transition: background 0.3s; }
.sync-dot.ok     { background: #52c41a; }
.sync-dot.saving { background: #faad14; animation: blink .8s infinite; }
.sync-dot.error  { background: #ff4d4f; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
.toolbar-right { display: flex; gap: 6px; align-items: center; }
.btn {
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
  padding: 5px 13px; border-radius: 8px; cursor: pointer;
  border: 1px solid #e0ddd6; background: #fff; color: #1a1a1a; transition: all .15s;
}
.btn:hover   { background: #f5f3ee; }
.btn-dark    { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.btn-dark:hover { background: #333; }
.btn-red     { color: #c0392b; border-color: #f5c6c4; }
.btn-red:hover { background: #fdf0ef; }

/* ── GRID 10×10 ── */
.grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 5px;
  padding: 10px;
}

.cell {
  border: 1px solid #e8e5e0; border-radius: 7px;
  aspect-ratio: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer; transition: all .12s;
  padding: 3px; gap: 2px;
  user-select: none; overflow: hidden;
}
.cell:hover { border-color: #aaa; background: #faf9f7; transform: scale(1.04); }
.cell.reserved { background: #edf4fb; border-color: #5b9fd4; }
.cell.reserved:hover { background: #dbeaf7; }

.cell-num {
  font-size: 11px; font-weight: 600; color: #ccc;
  font-family: 'DM Mono', monospace; line-height: 1;
}
.cell.reserved .cell-num { color: #2c6fa8; }

.cell-name {
  font-size: 9px; color: #1e6fa8; text-align: center;
  word-break: break-word; line-height: 1.2; font-weight: 600;
  max-width: 100%;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.dots-row { display: flex; gap: 2px; align-items: center; justify-content: center; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #e0ddd6; }
.cell.reserved .dot { background: #5b9fd4; }

/* ── LEGEND ── */
.legend {
  padding: 7px 20px; border-top: 1px solid #e0ddd6;
  display: flex; gap: 14px; align-items: center;
  background: #faf9f7; font-size: 11px; color: #999; flex-wrap: wrap;
}
.leg { display: flex; align-items: center; gap: 5px; }
.leg-box { width: 11px; height: 11px; border-radius: 3px; border: 1px solid; }
.leg-free { background: #fff; border-color: #e0ddd6; }
.leg-res  { background: #edf4fb; border-color: #5b9fd4; }
.leg-right { margin-left: auto; display: flex; gap: 10px; }
.leg-di { display: flex; align-items: center; gap: 4px; }

/* ── MODAL ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.28); z-index: 100;
  align-items: center; justify-content: center;
  backdrop-filter: blur(3px);
}
.overlay.open { display: flex; }
.modal {
  background: #fff; border: 1px solid #e0ddd6; border-radius: 16px;
  padding: 22px; width: 285px;
  box-shadow: 0 10px 40px rgba(0,0,0,.14);
}
.modal h2 { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
.modal-sub { font-size: 11px; color: #aaa; margin-bottom: 14px; }
.modal label {
  display: block; font-size: 10px; color: #aaa; font-weight: 600;
  text-transform: uppercase; letter-spacing: .6px; margin-bottom: 4px;
}
.modal input[type="text"] {
  font-family: 'DM Sans', sans-serif; font-size: 14px; width: 100%;
  padding: 8px 11px; border: 1px solid #e0ddd6; border-radius: 8px;
  background: #faf9f7; color: #1a1a1a; outline: none; margin-bottom: 12px;
}
.modal input[type="text"]:focus { border-color: #888; background: #fff; }
.cap-badge {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 6px 12px; border-radius: 8px;
  background: #edf4fb; border: 1px solid #b8d8f0; margin-bottom: 14px;
}
.cap-badge .cdots { display: flex; gap: 3px; }
.cap-badge .cdot  { width: 8px; height: 8px; border-radius: 50%; background: #5b9fd4; }
.cap-badge span { font-size: 12px; color: #2c6fa8; font-weight: 500; }
.modal-btns { display: flex; gap: 7px; }
.modal-btns button {
  flex: 1; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
  padding: 9px 4px; border-radius: 10px; cursor: pointer;
  border: 1px solid #e0ddd6; background: #fff; color: #1a1a1a; transition: all .12s;
}
.modal-btns button:hover { background: #f5f3ee; }
.mbtn-ok  { background: #1a1a1a !important; color: #fff !important; border-color: #1a1a1a !important; }
.mbtn-ok:hover  { background: #333 !important; }
.mbtn-del { color: #c0392b !important; border-color: #f5c6c4 !important; }
.mbtn-del:hover { background: #fdf0ef !important; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: #1a1a1a; color: #fff; font-size: 13px;
  padding: 9px 18px; border-radius: 100px; z-index: 200;
  opacity: 0; transition: all .22s; pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ════════════════════════════════════════
   IMPRESSÃO — paisagem A4, uma página só
   ════════════════════════════════════════ */
@media print {
  @page { size: A4 landscape; margin: 6mm; }

  body { background: #fff; padding: 0; font-size: 10px; }

  .screen-wrap {
    max-width: 100%; border: none; border-radius: 0;
    box-shadow: none;
  }

  /* esconde tudo que não é conteúdo */
  .toolbar-right, .overlay, .toast,
  .header-controls, .sync-badge { display: none !important; }

  .header  { padding: 4px 8px; border-bottom: 1px solid #ccc; }
  .toolbar { background: #fff; padding: 3px 8px; border-bottom: 1px solid #ccc; }
  .legend  { background: #fff; padding: 4px 8px; border-top: 1px solid #ccc; }

  /* grid compacto pra caber numa página */
  .grid {
    gap: 3px;
    padding: 5px 6px;
    /* força altura pra caber na página */
    grid-template-rows: repeat(10, 1fr);
    height: calc(148mm - 10px); /* A4 landscape height menos header/footer */
  }

  .cell {
    border-radius: 4px; cursor: default;
    aspect-ratio: unset; /* deixa o grid controlar a altura */
  }
  .cell:hover { transform: none; background: #fff; border-color: #e8e5e0; }
  .cell.reserved:hover { background: #edf4fb; border-color: #5b9fd4; }

  .cell-num  { font-size: 9px; }
  .cell-name { font-size: 8px; -webkit-line-clamp: 2; }
  .dot { width: 5px; height: 5px; }
}
</style>
</head>
<body>
<div class="screen-wrap">

  <!-- HEADER -->
  <div class="header">
    <div class="header-title">
      <h1>Reserva de Mesas</h1>
      <div class="sub" id="sub">—</div>
    </div>
    <div class="header-controls">
      <div class="fg">
        <label>Data</label>
        <input type="date" id="inp-data" onchange="onCtxChange()">
      </div>
      <div class="fg">
        <label>Turno</label>
        <div class="turno-toggle">
          <div class="turno-btn active" id="btn-tarde" onclick="setTurno('tarde')">Tarde</div>
          <div class="turno-btn"        id="btn-noite" onclick="setTurno('noite')">Noite</div>
        </div>
      </div>
      <div class="fg">
        <label>Banda</label>
        <input type="text" id="inp-banda" placeholder="Nome da banda" onchange="saveBanda()">
      </div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="stats" id="stats">—</div>
    <div class="toolbar-right">
      <div class="sync-badge">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-lbl">—</span>
      </div>
      <button class="btn btn-red"  onclick="clearAll()">Limpar tudo</button>
      <button class="btn btn-dark" onclick="window.print()">🖨️ Imprimir</button>
    </div>
  </div>

  <!-- GRID -->
  <div class="grid" id="grid"></div>

  <!-- LEGEND -->
  <div class="legend">
    <div class="leg"><div class="leg-box leg-free"></div>Livre</div>
    <div class="leg"><div class="leg-box leg-res"></div>Reservado</div>
    <div class="leg-right">
      <div class="leg-di">
        <div class="dots-row"><div class="dot" style="background:#aaa"></div><div class="dot" style="background:#aaa"></div></div>
        2 pessoas
      </div>
      <div class="leg-di">
        <div class="dots-row"><div class="dot" style="background:#aaa"></div><div class="dot" style="background:#aaa"></div><div class="dot" style="background:#aaa"></div><div class="dot" style="background:#aaa"></div></div>
        4 pessoas
      </div>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="m-title">Mesa 01</h2>
    <div class="modal-sub" id="m-sub"></div>
    <label>Capacidade</label>
    <div class="cap-badge">
      <div class="cdots" id="m-dots"></div>
      <span id="m-cap"></span>
    </div>
    <label>Nome do responsável</label>
    <input type="text" id="m-name" placeholder="Ex: João Silva"
           onkeydown="if(event.key==='Enter') saveRes()">
    <label>Observação (opcional)</label>
    <input type="text" id="m-obs"  placeholder="Ex: aniversário"
           onkeydown="if(event.key==='Enter') saveRes()">
    <div class="modal-btns">
      <button class="mbtn-ok"  onclick="saveRes()">Reservar</button>
      <button class="mbtn-del" id="btn-del" onclick="delRes()" style="display:none">Cancelar reserva</button>
      <button onclick="closeModal()">Fechar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// capacidades fixas: ímpares=2, pares=4
const CAPS = {};
for (let i = 1; i <= 100; i++)
  CAPS[String(i).padStart(2,'0')] = i % 2 === 0 ? 4 : 2;

let state = {}, selN = null, turno = 'tarde';

function fbKey()  { return `reservas/${document.getElementById('inp-data').value||'sem-data'}/${turno}`; }
function metaKey(){ return `meta/${document.getElementById('inp-data').value||'sem-data'}/${turno}`; }

function setSync(s) {
  document.getElementById('sync-dot').className = 'sync-dot ' + s;
  document.getElementById('sync-lbl').textContent =
    ({ok:'Salvo', saving:'Salvando...', error:'Erro'})[s] || s;
}

function onCtxChange() {
  updateSub();
  state = {}; renderGrid(); setSync('saving');
  if (!window._fb) { setTimeout(onCtxChange, 200); return; }
  window._fb.listen(fbKey(), d => { state = d || {}; renderGrid(); setSync('ok'); });
  window._fb.listen(metaKey(), d => {
    document.getElementById('inp-banda').value = d?.banda || '';
    updateSub();
  });
}

function setTurno(t) {
  turno = t;
  document.getElementById('btn-tarde').classList.toggle('active', t==='tarde');
  document.getElementById('btn-noite').classList.toggle('active', t==='noite');
  onCtxChange();
}

function saveBanda() {
  updateSub();
  if (window._fb) window._fb.set(metaKey(), { banda: document.getElementById('inp-banda').value });
}

function updateSub() {
  const data  = document.getElementById('inp-data').value;
  const banda = document.getElementById('inp-banda').value;
  const t     = turno === 'tarde' ? 'Tarde' : 'Noite';
  let parts   = [t];
  if (data) {
    const d = new Date(data + 'T12:00:00');
    parts.unshift(d.toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit',year:'numeric'}));
  }
  if (banda) parts.push('· ' + banda);
  document.getElementById('sub').textContent = parts.join(' — ');
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let i = 1; i <= 100; i++) {
    const n = String(i).padStart(2,'0'), res = state[n], cap = CAPS[n];
    const cell = document.createElement('div');
    cell.className = 'cell' + (res ? ' reserved' : '');
    cell.addEventListener('click', () => openModal(n));

    const row = document.createElement('div');
    row.className = 'dots-row';
    for (let d = 0; d < cap; d++) {
      const dot = document.createElement('div'); dot.className = 'dot'; row.appendChild(dot);
    }
    cell.appendChild(row);

    const num = document.createElement('div');
    num.className = 'cell-num'; num.textContent = n; cell.appendChild(num);

    if (res?.name) {
      const nm = document.createElement('div');
      nm.className = 'cell-name'; nm.textContent = res.name; cell.appendChild(nm);
    }
    grid.appendChild(cell);
  }
  updateStats();
}

function updateStats() {
  const total = Object.keys(state).length;
  const p2 = Object.values(state).filter(r=>r.cap===2).length;
  const p4 = Object.values(state).filter(r=>r.cap===4).length;
  document.getElementById('stats').innerHTML =
    `<b>${total}</b> reservadas (${p2}×2 pess., ${p4}×4 pess.) &nbsp;·&nbsp; <b>${100-total}</b> livres`;
}

function openModal(n) {
  selN = n;
  const res = state[n], cap = CAPS[n];
  document.getElementById('m-title').textContent = `Mesa ${n}`;
  document.getElementById('m-sub').textContent   = res ? `Reservado por: ${res.name}` : 'Clique em Reservar para confirmar';
  const dotsEl = document.getElementById('m-dots');
  dotsEl.innerHTML = '';
  for (let d = 0; d < cap; d++) {
    const dot = document.createElement('div'); dot.className = 'cdot'; dotsEl.appendChild(dot);
  }
  document.getElementById('m-cap').textContent  = `${cap} lugares (fixo)`;
  document.getElementById('m-name').value = res?.name || '';
  document.getElementById('m-obs').value  = res?.obs  || '';
  document.getElementById('btn-del').style.display = res ? 'block' : 'none';
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('m-name').focus(), 80);
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open'); selN = null;
}

async function saveRes() {
  const name = document.getElementById('m-name').value.trim();
  const obs  = document.getElementById('m-obs').value.trim();
  if (!name) { document.getElementById('m-name').focus(); return; }
  if (!window._fb) {
    showToast('Conectando, tente novamente em 2 segundos...');
    setTimeout(() => saveRes(), 2000);
    return;
  }
  setSync('saving');
  await window._fb.set(`${fbKey()}/${selN}`, { name, obs, cap: CAPS[selN] });
  showToast(`Mesa ${selN} reservada — ${name}`);
  closeModal();
}

async function delRes() {
  if (!window._fb) return;
  const n = selN; setSync('saving');
  await window._fb.remove(`${fbKey()}/${n}`);
  showToast(`Reserva da mesa ${n} cancelada`); closeModal();
}

async function clearAll() {
  if (!confirm('Apagar TODAS as reservas deste turno?') || !window._fb) return;
  setSync('saving');
  await window._fb.remove(fbKey());
  showToast('Reservas removidas');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) {
    e.stopPropagation();
    closeModal();
  }
});

document.getElementById('inp-data').value = new Date().toISOString().slice(0,10);
updateSub(); renderGrid();
(function waitFb() { window._fb ? onCtxChange() : setTimeout(waitFb, 150); })();
</script>
</body>
</html>
